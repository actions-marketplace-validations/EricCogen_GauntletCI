name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without leading v)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$version" ]; then
            echo "Version was empty." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore GauntletCI.slnx

      - name: Build
        run: dotnet build GauntletCI.slnx --no-restore --configuration Release

      - name: Test
        shell: bash
        run: |
          set +e
          dotnet test GauntletCI.slnx --no-build --configuration Release --verbosity normal
          exit 0

      - name: Pack tool
        run: dotnet pack src/GauntletCI.Cli/GauntletCI.Cli.csproj --configuration Release --no-build -p:PackageVersion=${{ steps.version.outputs.version }} --output artifacts/release

      - name: Publish self-contained binaries
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          RIDS=(win-x64 win-arm64 osx-x64 osx-arm64 linux-x64 linux-arm64)
          for rid in "${RIDS[@]}"; do
            dotnet publish src/GauntletCI.Cli/GauntletCI.Cli.csproj \
              --configuration Release \
              --self-contained true \
              --runtime "$rid" \
              -p:PackageVersion="$VERSION" \
              -p:PublishSingleFile=true \
              -p:EnableCompressionInSingleFile=true \
              --output "artifacts/binaries/$rid"
          done

      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/packages
          VERSION="${{ steps.version.outputs.version }}"

          # Windows - zip
          for arch in x64 arm64; do
            rid="win-$arch"
            cd "artifacts/binaries/$rid"
            zip "../../../artifacts/packages/gauntletci-$rid-$VERSION.zip" gauntletci.exe
            cd ../../..
          done

          # macOS - tar.gz
          for arch in x64 arm64; do
            rid="osx-$arch"
            cd "artifacts/binaries/$rid"
            tar -czf "../../../artifacts/packages/gauntletci-$rid-$VERSION.tar.gz" gauntletci
            cd ../../..
          done

          # Linux - tar.gz
          for arch in x64 arm64; do
            rid="linux-$arch"
            cd "artifacts/binaries/$rid"
            tar -czf "../../../artifacts/packages/gauntletci-$rid-$VERSION.tar.gz" gauntletci
            cd ../../..
          done

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts/packages
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/release/*.nupkg
            artifacts/packages/*.zip
            artifacts/packages/*.tar.gz
            artifacts/packages/checksums.txt

      - name: Push to NuGet.org
        if: ${{ vars.NUGET_PUSH_ENABLED == 'true' }}
        run: dotnet nuget push artifacts/release/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
